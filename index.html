<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛豆 · 汽车智能分析平台</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #141b22;
    --surface2: #1c2530;
    --border: #2a3545;
    --text: #c8d6e5;
    --text-dim: #6b7d95;
    --accent: #4dabf7;
    --accent2: #20c997;
    --danger: #ff6b6b;
    --warn: #ffd43b;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--accent); background: rgba(77,171,247,0.1); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }

  /* Main Layout */
  .main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 20px;
    height: calc(100vh - 56px);
  }

  /* Search Bar */
  .search-bar {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .search-input-wrapper {
    flex: 1;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(77,171,247,0.1);
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 18px;
  }
  .date-badge {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 13px;
    white-space: nowrap;
  }
  .date-badge span { color: var(--accent); font-weight: 600; }

  /* Section Title */
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 3px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Comparison Grid */
  .comparison-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    flex: 1;
    overflow: auto;
  }
  .car-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .car-card:hover { border-color: var(--accent); }
  .car-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .car-name {
    font-size: 18px;
    font-weight: 700;
  }
  .car-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-new { background: rgba(32,201,151,0.15); color: var(--accent2); }
  .badge-hot { background: rgba(255,107,107,0.15); color: var(--danger); }

  .car-image {
    width: 100%;
    height: 160px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: var(--text-dim);
  }

  .specs-table {
    width: 100%;
    font-size: 13px;
  }
  .specs-table td {
    padding: 6px 0;
    border-bottom: 1px solid rgba(42,53,69,0.5);
  }
  .specs-table td:first-child { color: var(--text-dim); width: 40%; }
  .specs-table td:last-child { font-weight: 600; text-align: right; }
  .spec-highlight { color: var(--accent2); }

  .ai-verdict {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    border-left: 3px solid var(--accent);
  }
  .ai-verdict-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .ai-verdict .score {
    color: var(--accent2);
    font-weight: 700;
  }

  /* Chat Panel */
  .chat-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    min-height: 180px;
    max-height: 240px;
  }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
  }
  .chat-messages {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-msg {
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 85%;
    line-height: 1.5;
  }
  .chat-msg.ai {
    background: var(--surface2);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  .chat-msg.user {
    background: rgba(77,171,247,0.12);
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
  }
  .chat-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .chat-input::placeholder { color: var(--text-dim); }
  .chat-send {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .chat-send:hover { background: #3699d6; }

  /* ============ MOBILE ============ */
  @media (max-width: 768px) {
    .header {
      padding: 0 12px;
      height: 48px;
    }
    .logo { font-size: 15px; }
    .nav-tabs { display: none; }
    .user-avatar { width: 28px; height: 28px; font-size: 12px; }

    .main {
      height: auto;
      padding: 12px;
      gap: 14px;
    }

    .search-bar {
      flex-direction: column;
      gap: 8px;
    }
    .search-input {
      padding: 10px 14px 10px 38px;
      font-size: 14px;
    }
    .search-icon { left: 12px; font-size: 16px; }
    .date-badge {
      width: 100%;
      text-align: center;
      font-size: 13px;
      padding: 8px 12px;
    }

    .section-title { font-size: 14px; }

    /* Horizontal scroll cards */
    .comparison-grid {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 12px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .comparison-grid::-webkit-scrollbar { display: none; }
    .car-card {
      min-width: 85vw;
      max-width: 85vw;
      scroll-snap-align: start;
      padding: 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    .car-name { font-size: 16px; }
    .car-image { height: 120px; font-size: 40px; }
    .specs-table { font-size: 12px; }
    .specs-table td { padding: 4px 0; }
    .ai-verdict { font-size: 12px; padding: 12px; }
    .ai-verdict-label { font-size: 10px; }

    .chat-panel {
      min-height: 160px;
      max-height: none;
      flex: 1;
    }
    .chat-messages { font-size: 13px; padding: 10px 12px; }
    .chat-msg { padding: 8px 12px; max-width: 90%; }
    .chat-input { font-size: 14px; padding: 10px 12px; }
    .chat-send { font-size: 13px; padding: 10px 14px; }
  }

  /* Bottom tab bar (mobile only) */
  .mobile-nav { display: none; }
  @media (max-width: 768px) {
    .mobile-nav {
      display: flex;
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 8px;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      gap: 4px;
    }
    .mobile-nav-tab {
      flex: 1;
      padding: 8px 4px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .mobile-nav-tab .icon { font-size: 18px; }
    .mobile-nav-tab.active { color: var(--accent); }
  }

  @media (min-width: 769px) and (max-width: 1024px) {
    .comparison-grid { grid-template-columns: 1fr; }
    .main { height: auto; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="logo">🚗 赛豆 · 汽车智能平台</span>
    <nav class="nav-tabs">
      <button class="nav-tab active">产品透视</button>
      <button class="nav-tab">产品推演</button>
      <button class="nav-tab">参谋对话</button>
      <button class="nav-tab">知识库</button>
    </nav>
  </div>
  <div class="header-right">
    <span class="user-avatar">王</span>
  </div>
</header>

<!-- Main Content -->
<main class="main">

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrapper">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="搜索历史竞品报告、品牌、车型..." />
    </div>
    <div class="date-badge">📅 今日日报：<span>2026年6月18日</span></div>
  </div>

  <!-- Comparison Section -->
  <div class="section-title">📊 今日竞品透视 · 新品发布</div>

  <div class="comparison-grid" id="comparisonGrid">
    <!-- Car cards injected by JS -->
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-header-dot"></span> AI 助手 · 基于今日日报追问
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg ai">
        👋 早上好！今天是6月18日，今天重点关注三款新发布的车型。您可以问我任何关于它们的问题，比如"哪款性价比最高"、"和我们的产品线有什么冲突"、"建议我们怎么应对"。
      </div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" type="text" placeholder="输入你的问题，基于今日数据实时分析..." />
      <button class="chat-send" onclick="sendMessage()">发送</button>
    </div>
  </div>

</main>

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <button class="mobile-nav-tab active"><span class="icon">📊</span>产品透视</button>
  <button class="mobile-nav-tab"><span class="icon">🔮</span>产品推演</button>
  <button class="mobile-nav-tab"><span class="icon">💬</span>参谋对话</button>
  <button class="mobile-nav-tab"><span class="icon">📚</span>知识库</button>
</nav>

<script>
// --- Mock Data ---
const cars = [
  {
    name: "小米 SU7 Ultra",
    badge: "new",
    badgeText: "今日发布",
    emoji: "⚡",
    specs: [
      ["售价", "52.99 万起"],
      ["动力", "1548 匹 · 三电机"],
      ["零百加速", "1.97 秒"],
      ["续航 (CLTC)", "800 km"],
      ["智驾方案", "Xiaomi Pilot Max"],
      ["定位", "高性能轿跑"],
    ],
    verdict: "参数拉满，定价上探到豪华区间。<b>对赛豆的威胁：</b>同价位段形成直接竞争，小米品牌势能 + 渠道能力不容低估。建议关注其实际交付节奏和智驾体验口碑。",
    score: "竞品威胁度：高",
  },
  {
    name: "比亚迪 汉 L",
    badge: "hot",
    badgeText: "热度飙升",
    emoji: "🔋",
    specs: [
      ["售价", "22.98 - 32.98 万"],
      ["动力", "517 匹 · 双电机"],
      ["零百加速", "3.9 秒"],
      ["续航 (CLTC)", "705 km"],
      ["智驾方案", "DiPilot 300"],
      ["定位", "中大型旗舰轿车"],
    ],
    verdict: "价格区间覆盖主流市场，刀片电池+DM-i双路线策略稳健。<b>对赛豆的启示：</b>定价策略值得参考——用混动拉低门槛、纯电冲高端，两条腿走路抗风险能力强。",
    score: "竞品威胁度：中高",
  },
  {
    name: "蔚来 ET9",
    badge: "new",
    badgeText: "开启预订",
    emoji: "🛡️",
    specs: [
      ["售价", "80 万起"],
      ["动力", "707 匹 · 双电机"],
      ["零百加速", "3.5 秒"],
      ["续航 (CLTC)", "750 km"],
      ["智驾方案", "NIO Aquila 2.0"],
      ["定位", "行政旗舰"],
    ],
    verdict: "定价脱离主流市场，主打换电+服务体系差异化。<b>对赛豆的影响：</b>直接竞争较小（价位不重叠），但蔚来的服务体系标准正在拉高用户预期，需关注体验侧的军备竞赛。",
    score: "竞品威胁度：低",
  },
];

// --- Render Cards ---
function renderCards() {
  const grid = document.getElementById('comparisonGrid');
  grid.innerHTML = cars.map(car => `
    <div class="car-card">
      <div class="car-card-header">
        <span class="car-name">${car.name}</span>
        <span class="car-badge ${car.badge === 'new' ? 'badge-new' : 'badge-hot'}">${car.badgeText}</span>
      </div>
      <div class="car-image">${car.emoji}</div>
      <table class="specs-table">
        ${car.specs.map(s => `
          <tr>
            <td>${s[0]}</td>
            <td class="${s[0] === '售价' ? 'spec-highlight' : ''}">${s[1]}</td>
          </tr>
        `).join('')}
      </table>
      <div class="ai-verdict">
        <div class="ai-verdict-label">🤖 AI 分析</div>
        ${car.verdict}
        <div style="margin-top:8px;font-weight:700;color:var(--accent)">${car.score}</div>
      </div>
    </div>
  `).join('');
}

// --- Chat ---
const aiReplies = [
  "从今天的竞品数据来看，<b>小米SU7 Ultra</b>的定价策略最为激进——52.99万起的定价直接打入了传统豪华品牌的腹地。如果赛豆有同价位产品在规划中，建议重点关注小米的实际交付能力和智驾体验口碑，这两个变量会直接影响它的市场表现。",
  "三款车里，<b>比亚迪汉L</b>的定价策略最值得参考。22.98万的入门款（DM-i混动）负责走量，32.98万的顶配（纯电）负责冲品牌——两条腿走路的策略在当下的政策环境下抗风险能力最强。",
  "综合来看，今天的竞品发布传递了一个信号：<b>高性能三电机正在从百万级下探到50万级</b>。建议赛豆在产品定义时认真考虑这个趋势——如果两年后三电机成为50万级的标配，我们现在的产品参数是否还有竞争力？",
  "蔚来ET9的换电服务体系值得关注，但80万+的定价让它的直接威胁较小。<b>真正需要警惕的是蔚来对用户服务预期的拉升</b>——当用户习惯了换电、上门取送车这些服务后，会对所有品牌的售后体验提出更高要求。",
];

let replyIndex = 0;
function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const container = document.getElementById('chatMessages');
  container.innerHTML += `<div class="chat-msg user">${escapeHtml(msg)}</div>`;
  input.value = '';

  // Simulate AI reply
  const reply = aiReplies[replyIndex % aiReplies.length];
  replyIndex++;
  setTimeout(() => {
    container.innerHTML += `<div class="chat-msg ai">${reply}</div>`;
    container.scrollTop = container.scrollHeight;
  }, 600);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- Init ---
renderCards();

// Enter key to send
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
